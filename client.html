<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI MMORPG</title>
<style>
  body { font-family: Arial; }
  canvas { border: 1px solid #111; image-rendering: pixelated; }
  .row { display:flex; gap:16px; align-items:flex-start; }
  .panel { border: 1px solid #aaa; padding: 10px; width: 380px; }
  .legend div { margin: 4px 0; }
  .box { display:inline-block; width:12px; height:12px; margin-right:6px; border:1px solid #222; }
  .mono { font-family: ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }
  button { padding: 8px 10px; }
</style>
</head>
<body>

<h2>AI MMORPG WORLD</h2>

<button onclick="spawnPlayer()">Spawn Player</button>

<div class="row" style="margin-top:12px;">
  <div>
    <canvas id="world" width="640" height="640"></canvas>
    <div id="stats" class="panel mono" style="margin-top:10px;"></div>
  </div>

  <div>
    <div class="panel">
      <b>Minimap</b><br><br>
      <canvas id="minimap" width="220" height="220"></canvas>
    </div>

    <div class="panel legend" style="margin-top:12px;">
      <b>LEGEND</b>
      <div><span class="box" style="background:red"></span> Player</div>
      <div><span class="box" style="background:blue"></span> NPC</div>

      <div style="margin-top:8px;"><b>Tiles</b></div>
      <div><span class="box" style="background:#6fcf6a"></span> Grass (G)</div>
      <div><span class="box" style="background:#2f8f45"></span> Forest (F)</div>
      <div><span class="box" style="background:#999"></span> Mountain (M)</div>
      <div><span class="box" style="background:#4da6ff"></span> Water (W)</div>

      <div style="margin-top:8px;"><b>World objects</b></div>
      <div><span class="box" style="background:#00aa00"></span> Food</div>
      <div><span class="box" style="background:#0b3d1e"></span> Wood (tree)</div>
      <div><span class="box" style="background:#d3d3d3"></span> Stone</div>
      <div><span class="box" style="background:#8b4513"></span> House</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("world");
const ctx = canvas.getContext("2d");

const minimap = document.getElementById("minimap");
const mctx = minimap.getContext("2d");

let playerId = null;

function tileColor(t){
  if (t === "G") return "#6fcf6a";
  if (t === "F") return "#2f8f45";
  if (t === "M") return "#999999";
  if (t === "W") return "#4da6ff";
  return "#ffffff";
}

async function spawnPlayer(){
  const r = await fetch("/spawn_player", { method: "POST" });
  const data = await r.json();
  playerId = data.player_id || null;
}

async function update(){
  const r = await fetch("/state", { cache: "no-store" });
  const data = await r.json();

  const cellSize = 32;
  const viewW = Math.floor(canvas.width / cellSize);
  const viewH = Math.floor(canvas.height / cellSize);

  let cameraX = 0, cameraY = 0;
  let playerData = null;

  if (playerId){
    const pr = await fetch(`/player/${playerId}`, { cache: "no-store" });
    if (pr.status === 200){
      playerData = await pr.json();
      cameraX = playerData.x - Math.floor(viewW/2);
      cameraY = playerData.y - Math.floor(viewH/2);
    }
  }

  // clamp camera
  cameraX = Math.max(0, Math.min(cameraX, data.width - viewW));
  cameraY = Math.max(0, Math.min(cameraY, data.height - viewH));

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // --- Layer 0: tiles ---
  for (let y=0; y<viewH; y++){
    for (let x=0; x<viewW; x++){
      const wx = x + cameraX;
      const wy = y + cameraY;
      if (wx<0 || wy<0 || wx>=data.width || wy>=data.height) continue;

      const t = data.tiles[wy][wx];
      ctx.fillStyle = tileColor(t);
      ctx.fillRect(x*cellSize, y*cellSize, cellSize, cellSize);
    }
  }

  // helper to draw world-point objects
  function drawCell(x, y, color){
    const sx = (x - cameraX) * cellSize;
    const sy = (y - cameraY) * cellSize;
    if (sx < -cellSize || sy < -cellSize || sx > canvas.width || sy > canvas.height) return;

    // disegna “icona” più piccola per capire meglio
    const pad = Math.floor(cellSize * 0.2);
    ctx.fillStyle = color;
    ctx.fillRect(sx + pad, sy + pad, cellSize - pad*2, cellSize - pad*2);
  }

  // --- Layer 1: resources ---
  (data.food || []).forEach(f => drawCell(f.x, f.y, "#00aa00"));      // food
  (data.wood || []).forEach(w => drawCell(w.x, w.y, "#0b3d1e"));      // wood/tree
  (data.stone || []).forEach(s => drawCell(s.x, s.y, "#d3d3d3"));     // stone

  // --- Layer 2: structures (houses) ---
  (data.structures || []).forEach(h => {
    const sx = (h.x - cameraX) * cellSize;
    const sy = (h.y - cameraY) * cellSize;
    if (sx < -cellSize || sy < -cellSize || sx > canvas.width || sy > canvas.height) return;

    ctx.fillStyle = "#8b4513";
    ctx.fillRect(sx, sy, cellSize, cellSize);
    ctx.strokeStyle = "#1a1a1a";
    ctx.strokeRect(sx, sy, cellSize, cellSize);
  });

  // --- Layer 3: agents ---
  (data.agents || []).forEach(a => {
    const sx = (a.x - cameraX) * cellSize;
    const sy = (a.y - cameraY) * cellSize;
    if (sx < -cellSize || sy < -cellSize || sx > canvas.width || sy > canvas.height) return;

    const isPlayer = a.is_player && a.player_id === playerId;

    ctx.fillStyle = isPlayer ? "red" : "blue";
    ctx.fillRect(sx, sy, cellSize, cellSize);

    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, cellSize, cellSize);
    ctx.lineWidth = 1;
  });

  // --- Dashboard ---
  const inv = playerData?.inventory || { food:0, wood:0, stone:0 };
  document.getElementById("stats").innerHTML = `
<b>WORLD STATS</b>
tick: ${data.tick}
population: ${data.population} (players: ${data.players}, npcs: ${data.npcs})
avg_hunger: ${data.avg_hunger}

food: ${data.food_count}
wood: ${data.wood_count}
stone: ${data.stone_count}

<b>PLAYER</b>
id: ${playerId ? playerId.slice(0,8)+"..." : "-"}
pos: ${playerData ? `(${playerData.x}, ${playerData.y})` : "-"}
hunger: ${playerData ? playerData.hunger : "-"}
inventory: food=${inv.food ?? 0}, wood=${inv.wood ?? 0}, stone=${inv.stone ?? 0}
  `.replaceAll("\n", "<br>");
  
  renderMinimap(data, cameraX, cameraY, viewW, viewH);
}

function renderMinimap(data, cameraX, cameraY, viewW, viewH){
  const w = minimap.width, h = minimap.height;
  const sx = w / data.width;
  const sy = h / data.height;

  // draw tiles (sample)
  const step = Math.max(2, Math.floor(data.width / 120));
  mctx.clearRect(0,0,w,h);

  for (let y=0; y<data.height; y+=step){
    for (let x=0; x<data.width; x+=step){
      mctx.fillStyle = tileColor(data.tiles[y][x]);
      mctx.fillRect(x*sx, y*sy, step*sx, step*sy);
    }
  }

  // viewport rect
  mctx.strokeStyle = "#000";
  mctx.strokeRect(cameraX*sx, cameraY*sy, viewW*sx, viewH*sy);
}

setInterval(update, 200);
</script>

</body>
</html>
